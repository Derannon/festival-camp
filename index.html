<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Out Drink the Thinkers</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Montserrat, sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.container{
max-width:600px;
padding:30px;
}

h1{
font-family:'Bebas Neue',cursive;
font-size:60px;
letter-spacing:3px;
margin-bottom:10px;
}

.subtitle{
font-size:18px;
opacity:0.8;
margin-bottom:30px;
}

.visitor{
font-size:24px;
margin-bottom:30px;
}

.counter{
font-size:70px;
font-weight:600;
margin:20px 0;
}

button{
background:#ffcc00;
border:none;
padding:15px 30px;
font-size:20px;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

.footer{
margin-top:30px;
opacity:0.6;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h1>OUT DRINK<br>THE THINKERS</h1>

<div class="subtitle">
Out Think the Drinkers
</div>

<div class="visitor">
You are visitor <b id="scanCounter">#...</b>
</div>

<div class="counter" id="beerCounter">
🍺 0
</div>

<button onclick="addBeer()">
Drink with us
</button>

<div class="footer">
Find our camp. Claim your beer.
</div>

</div>

<!-- GoatCounter -->
<script data-goatcounter="https://derannson.goatcounter.com/count"
async src="//gc.zgo.at/count.js"></script>

<script src="script.js"></script>

</body>
</html>
